<!DOCTYPE html>
<html>
<head>
<title>Chat Room</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#ece5dd;
}

.chat {
  max-width:600px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header {
  background:#075e54;
  color:white;
  padding:15px;
}

.messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  background:white;
  padding:10px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
}

.me {
  background:#dcf8c6;
  margin-left:auto;
}

img {
  max-width:200px;
  border-radius:10px;
}

.input {
  display:flex;
  padding:10px;
  background:white;
}

input[type="text"] {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button {
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#25d366;
  color:white;
}
</style>
</head>

<body>

<div class="chat">
  <div class="header">💬 Chat Room</div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="text" placeholder="Type message">
    <input type="file" id="file">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const messages = document.getElementById("messages");

// send message
function send() {
  const text = document.getElementById("text").value;
  const file = document.getElementById("file").files[0];

  if (text) {
    socket.emit("chat message", text);
    addText(text, true);
    document.getElementById("text").value = "";
  }

  if (file) {
    uploadImage(file);
  }
}

// upload image
async function uploadImage(file) {
  const fd = new FormData();
  fd.append("image", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: fd
  });

  const data = await res.json();

  socket.emit("image message", data);
  addImage(data, true);
}

// receive text
socket.on("chat message", (msg) => {
  addText(msg, false);
});

// receive image
socket.on("image message", (data) => {
  addImage(data, false);
});

// UI functions
function addText(text, me) {
  const div = document.createElement("div");
  div.className = "msg " + (me ? "me" : "");
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addImage(data, me) {
  const div = document.createElement("div");
  div.className = "msg " + (me ? "me" : "");
  div.innerHTML = `<img src="${data.imageUrl}">`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
