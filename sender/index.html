<!DOCTYPE html>
<html>
<head>
<title>Sender</title>
<style>
body { font-family:sans-serif; background:#667eea; color:white; }
.container { max-width:600px; margin:auto; padding:20px; }
.msg { background:#dcf8c6; color:black; padding:10px; margin:5px; border-radius:10px; }
img { max-width:200px; border-radius:10px; }
</style>
</head>

<body>
<div class="container">
<h2>👤 Sender</h2>

<div id="messages"></div>

<input id="text" placeholder="Message">
<input type="file" id="file">
<button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io(); // 🔥 FIX (no URL)
const messages = document.getElementById("messages");

function send() {
  const text = document.getElementById("text").value;
  const file = document.getElementById("file").files[0];

  if (text) {
    socket.emit("chat message", text);
    document.getElementById("text").value = "";
  }

  if (file) upload(file);
}

async function upload(file) {
  const fd = new FormData();
  fd.append("image", file);

  const res = await fetch("/upload", { method:"POST", body:fd });
  const data = await res.json();

  socket.emit("image message", data);
}

socket.on("chat message", (msg) => {
  const div = document.createElement("div");
  div.className="msg";
  div.innerText=msg;
  messages.appendChild(div);
});

socket.on("image message", (data) => {
  const div = document.createElement("div");
  div.className="msg";
  div.innerHTML=`<img src="${data.imageUrl}">`;
  messages.appendChild(div);
});
</script>
</body>
</html>
